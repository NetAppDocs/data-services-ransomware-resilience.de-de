indexpage:
  title: NetApp Ransomware Resilience Dokumentation
  summary: NetApp Ransomware Resilience schützt, erkennt und unterstützt die Wiederherstellung
    von Anwendungs-Workloads und Dateifreigaben vor Ransomware-Bedrohungen im lokalen
    und Cloud-Speicher. Ransomware Resilience ermöglicht sichere Datensicherung und
    -wiederherstellung und hilft Unternehmen so, kritische Daten zu schützen und die
    Geschäftskontinuität für Oracle, VM-Datenspeicher, NAS-Speicher und mehr aufrechtzuerhalten.
